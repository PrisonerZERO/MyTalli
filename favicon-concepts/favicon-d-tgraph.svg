<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Concept D: Big white T with ascending bar chart behind it -->
  <rect width="32" height="32" rx="7" fill="#6c5ce7"/>
  <!-- Background ascending bars (behind the T) -->
  <rect x="4" y="22" width="5" height="6" rx="1" fill="#a78bfa"/>
  <rect x="10.5" y="17" width="5" height="11" rx="1" fill="#a78bfa"/>
  <rect x="17" y="12" width="5" height="16" rx="1" fill="#a78bfa"/>
  <rect x="23.5" y="7" width="5" height="21" rx="1" fill="#a78bfa"/>
  <!-- Bold white T on top -->
  <text x="16" y="24" text-anchor="middle" font-family="DM Sans, sans-serif" font-weight="700" font-size="24" fill="#ffffff">T</text>
</svg>
