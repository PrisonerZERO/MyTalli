<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Concept B: Tally marks (4 vertical + 1 diagonal) on purple rounded square -->
  <rect width="32" height="32" rx="7" fill="#6c5ce7"/>
  <g stroke="#ffffff" stroke-width="2.5" stroke-linecap="round">
    <!-- Four vertical tally marks -->
    <line x1="7" y1="8" x2="7" y2="24"/>
    <line x1="13" y1="8" x2="13" y2="24"/>
    <line x1="19" y1="8" x2="19" y2="24"/>
    <line x1="25" y1="8" x2="25" y2="24"/>
    <!-- Diagonal strike-through -->
    <line x1="4" y1="20" x2="28" y2="10"/>
  </g>
</svg>
