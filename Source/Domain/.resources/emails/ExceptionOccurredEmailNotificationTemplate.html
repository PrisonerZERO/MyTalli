<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exception Occurred</title>
</head>
<body style="background-color: #f8f7fc; font-family: 'DM Sans', Arial, Helvetica, sans-serif; margin: 0; padding: 0;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: #f8f7fc; padding: 32px 0;">
        <tr>
            <td align="center">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width: 600px; width: 100%;">

                    <!-- HEADER -->
                    <tr>
                        <td style="background-color: #6c5ce7; border-radius: 8px 8px 0 0; padding: 24px 32px; text-align: center;">
                            <span style="color: #ffffff; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.5px;">My</span><span style="color: #a78bfa; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.5px;">Talli</span>
                        </td>
                    </tr>

                    <!-- ALERT BANNER -->
                    <tr>
                        <td style="background-color: #e74c3c; padding: 12px 32px; text-align: center;">
                            <span style="color: #ffffff; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;">Exception Occurred</span>
                        </td>
                    </tr>

                    <!-- BODY -->
                    <tr>
                        <td style="background-color: #ffffff; padding: 32px;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">

                                <!-- Exception Type -->
                                <tr>
                                    <td style="padding: 0 0 20px;">
                                        <div style="color: #999999; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; text-transform: uppercase;">Exception Type</div>
                                        <div style="color: #1a1a2e; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700;">[[Exception.Type]]</div>
                                    </td>
                                </tr>

                                <!-- Message -->
                                <tr>
                                    <td style="padding: 0 0 20px;">
                                        <div style="color: #999999; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; text-transform: uppercase;">Message</div>
                                        <div style="color: #1a1a2e; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 14px;">[[Exception.Message]]</div>
                                    </td>
                                </tr>

                                <!-- Timestamp & Request Row -->
                                <tr>
                                    <td style="padding: 0 0 20px;">
                                        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                            <tr>
                                                <td width="50%" style="padding-right: 12px; vertical-align: top;">
                                                    <div style="color: #999999; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; text-transform: uppercase;">Timestamp</div>
                                                    <div style="color: #1a1a2e; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 14px;">[[Exception.Timestamp]]</div>
                                                </td>
                                                <td width="50%" style="padding-left: 12px; vertical-align: top;">
                                                    <div style="color: #999999; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; text-transform: uppercase;">Environment</div>
                                                    <div style="color: #1a1a2e; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 14px;">[[Environment.Name]]</div>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>

                                <!-- Request -->
                                <tr>
                                    <td style="padding: 0 0 24px;">
                                        <div style="color: #999999; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; text-transform: uppercase;">Request</div>
                                        <div style="color: #1a1a2e; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 14px;"><strong>[[Request.Method]]</strong> [[Request.Path]]</div>
                                    </td>
                                </tr>

                                <!-- Divider -->
                                <tr>
                                    <td style="border-top: 1px solid #e0dce8; padding: 0 0 24px;"></td>
                                </tr>

                                <!-- Stack Trace -->
                                <tr>
                                    <td>
                                        <div style="color: #999999; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase;">Stack Trace</div>
                                        <pre style="background-color: #f0edff; border: 1px solid #e0dce8; border-radius: 6px; color: #1a1a2e; font-family: Consolas, 'Courier New', monospace; font-size: 12px; line-height: 1.5; margin: 0; overflow-x: auto; padding: 16px; white-space: pre-wrap; word-break: break-all;">[[Exception.StackTrace]]</pre>
                                    </td>
                                </tr>

                            </table>
                        </td>
                    </tr>

                    <!-- FOOTER -->
                    <tr>
                        <td style="background-color: #f8f7fc; border-top: 1px solid #e0dce8; padding: 20px 32px; text-align: center;">
                            <p style="color: #999999; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-size: 12px; margin: 0;">This is an automated notification from MyTalli.</p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
