<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1600">
<title>MyTalli — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1600px; height: 900px; overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: #0a0a14;
    position: relative;
  }

  /* === BACKGROUND LAYERS === */
  .bg-mesh {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 900px 600px at 15% 40%, rgba(108,92,231,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 700px 500px at 85% 30%, rgba(139,92,246,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 500px 400px at 50% 90%, rgba(108,92,231,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 300px 300px at 75% 75%, rgba(167,139,250,0.06) 0%, transparent 70%);
  }

  .bg-grid {
    position: absolute; inset: 0; z-index: 1;
    background-image:
      linear-gradient(rgba(108,92,231,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,92,231,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 1000px 600px at 50% 50%, black 20%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 1000px 600px at 50% 50%, black 20%, transparent 80%);
  }

  /* Floating orbs */
  .orb {
    position: absolute; border-radius: 50%; z-index: 1; filter: blur(80px);
  }
  .orb-1 { width: 400px; height: 400px; background: rgba(108,92,231,0.15); top: -100px; left: -50px; }
  .orb-2 { width: 300px; height: 300px; background: rgba(139,92,246,0.10); bottom: -80px; right: 100px; }
  .orb-3 { width: 200px; height: 200px; background: rgba(167,139,250,0.08); top: 200px; right: -40px; }

  /* Diagonal accent line */
  .accent-line {
    position: absolute; z-index: 2;
    width: 600px; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(108,92,231,0.4), transparent);
    top: 180px; left: 50%; transform: translateX(-50%) rotate(-3deg);
  }
  .accent-line-2 {
    position: absolute; z-index: 2;
    width: 400px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(167,139,250,0.25), transparent);
    bottom: 220px; left: 50%; transform: translateX(-50%) rotate(2deg);
  }

  /* === MAIN CONTENT === */
  .content {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
  }

  /* Coming Soon tag */
  .coming-soon-tag {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(108,92,231,0.12);
    border: 1px solid rgba(108,92,231,0.25);
    border-radius: 100px;
    padding: 10px 28px;
    margin-bottom: 44px;
    letter-spacing: 4px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    color: #a78bfa;
  }
  .coming-soon-tag .dot {
    width: 8px; height: 8px;
    background: #6c5ce7;
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(108,92,231,0.6);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 12px rgba(108,92,231,0.6); }
    50% { opacity: 0.5; box-shadow: 0 0 20px rgba(108,92,231,0.9); }
  }

  /* Logo */
  .logo-group {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 32px;
  }
  .logo-icon-img {
    width: 72px; height: 72px;
    border-radius: 18px;
    box-shadow: 0 8px 32px rgba(108,92,231,0.35), 0 0 0 1px rgba(167,139,250,0.15);
  }

  .logo-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 56px; font-weight: 700;
    color: #e8e6f0;
    letter-spacing: -1px;
  }
  .logo-accent { color: #a78bfa; }

  /* Tagline */
  .tagline {
    font-size: 28px; font-weight: 400;
    color: #a09cae;
    line-height: 1.5;
    margin-bottom: 52px;
    max-width: 700px;
  }
  .tagline .highlight {
    color: #f5c842;
    font-weight: 600;
  }

  /* Platform pills */
  .platforms {
    display: flex; gap: 14px;
    margin-bottom: 56px;
  }
  .platform-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 22px;
    border-radius: 100px;
    font-size: 14px; font-weight: 600;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(4px);
  }
  .platform-pill .pip {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .pip-stripe { background: #635bff; box-shadow: 0 0 8px rgba(99,91,255,0.5); }
  .pip-etsy { background: #f56400; box-shadow: 0 0 8px rgba(245,100,0,0.5); }
  .pip-gumroad { background: #ff90e8; box-shadow: 0 0 8px rgba(255,144,232,0.5); }
  .pip-paypal { background: #2a7fff; box-shadow: 0 0 8px rgba(42,127,255,0.5); }
  .pip-shopify { background: #96bf48; box-shadow: 0 0 8px rgba(150,191,72,0.5); }

  /* URL */
  .site-url {
    font-size: 16px;
    font-weight: 500;
    color: #5c5977;
    letter-spacing: 2px;
  }
  .site-url span {
    color: #7a7790;
  }

  /* Corner decorations */
  .corner-mark {
    position: absolute; z-index: 5;
    width: 40px; height: 40px;
    border-color: rgba(108,92,231,0.2);
    border-style: solid;
  }
  .corner-tl { top: 40px; left: 40px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 40px; right: 40px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 40px; left: 40px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 40px; right: 40px; border-width: 0 2px 2px 0; }

  /* Noise texture overlay */
  .noise {
    position: absolute; inset: 0; z-index: 3;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<div class="noise"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="accent-line"></div>
<div class="accent-line-2"></div>

<div class="corner-mark corner-tl"></div>
<div class="corner-mark corner-tr"></div>
<div class="corner-mark corner-bl"></div>
<div class="corner-mark corner-br"></div>

<div class="content">
  <div class="coming-soon-tag">
    <span class="dot"></span>
    Coming Soon
  </div>

  <div class="logo-group">
    <img src="../favicon-concepts/favicon-c-growth.png" alt="MyTalli" class="logo-icon-img">
    <span class="logo-text">My<span class="logo-accent">Talli</span></span>
  </div>

  <div class="tagline">
    All your side hustle revenue.<br>
    <span class="highlight">One dashboard.</span>
  </div>

  <div class="platforms">
    <div class="platform-pill"><span class="pip pip-stripe"></span>Stripe</div>
    <div class="platform-pill"><span class="pip pip-etsy"></span>Etsy</div>
    <div class="platform-pill"><span class="pip pip-gumroad"></span>Gumroad</div>
    <div class="platform-pill"><span class="pip pip-paypal"></span>PayPal</div>
    <div class="platform-pill"><span class="pip pip-shopify"></span>Shopify</div>
  </div>

  <div class="site-url"><span>www.</span>mytalli.com</div>
</div>

</body>
</html>
