<!DOCTYPE html>
<html>
<head><title>SVG to PNG Converter</title></head>
<body>
<h2>SVG to PNG Converter</h2>
<div id="status">Converting...</div>
<canvas id="canvas1" style="border:1px solid #ccc; display:block; margin:10px 0;"></canvas>
<canvas id="canvas2" style="border:1px solid #ccc; display:block; margin:10px 0;"></canvas>
<a id="dl1" style="display:none;">Download Hero BG</a>
<a id="dl2" style="display:none;">Download Icon</a>
<script>
async function convert(svgUrl, width, height, canvasId, dlId, filename) {
    const canvas = document.getElementById(canvasId);
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');

    const resp = await fetch(svgUrl);
    const svgText = await resp.text();
    const blob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);

    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            ctx.drawImage(img, 0, 0, width, height);
            URL.revokeObjectURL(url);
            const dataUrl = canvas.toDataURL('image/png');
            const dl = document.getElementById(dlId);
            dl.href = dataUrl;
            dl.download = filename;
            dl.style.display = 'inline-block';
            dl.style.margin = '10px';
            dl.style.padding = '10px 20px';
            dl.style.background = '#6c5ce7';
            dl.style.color = '#fff';
            dl.style.textDecoration = 'none';
            dl.style.borderRadius = '8px';
            dl.textContent = 'Download ' + filename;
            resolve();
        };
        img.src = url;
    });
}

(async () => {
    await convert('email-hero-bg.svg', 600, 320, 'canvas1', 'dl1', 'email-hero-bg.png');
    await convert('email-icon-graph.svg', 80, 80, 'canvas2', 'dl2', 'email-icon-graph.png');
    document.getElementById('status').textContent = 'Done! Click buttons to download.';
})();
</script>
</body>
</html>
